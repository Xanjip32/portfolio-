  <script>
    (function() {
      var saved = localStorage.getItem('lang');
      if (!saved) {
        var bl = (navigator.language || navigator.userLanguage || '').toLowerCase();
        saved = bl.startsWith('ko') ? 'ko' : 'en';
      }
      document.documentElement.lang = saved;
    })();
  </script>

    html, body { background: #090f1d; color: #fff; margin: 0; padding: 0; }

                <a href="https://www.linkedin.com/in/sanjeev-shrestha-225006382/" target="_blank"
