    <script>
    const translations = {
      en: {
        nav_home: "Home", nav_about: "About", nav_projects: "Projects", nav_certificates: "Certificates", nav_contact: "Contact",
        lang_switch: "Switch to 한국어",
        contact_title: "Get In Touch", contact_desc: "Just want to say hi? I'd love to hear from you.",

      },

        nav_home: "\ud648", nav_about: "\uc11c\ubcf4", nav_projects: "\ud504\ub85c\uc81d\ud2b8", nav_certificates: "\uc9c8\uc790", nav_contact: "\uc5f0\ub77d",
        lang_switch: "English\ub85c \uc804\ud658",
        contact_title: "\uc5f0\ub77d\ud558\uae30", contact_desc: "\uc548\ub155\ud558\uc138\uc694? \ud655\uc2dc \ub204\uc2dc\uace0 \uc2f6\uc2b5\ub2c8\ub2e4.",

      }
    };
    let currentLang = localStorage.getItem('lang') || 'en';
    function toggleLang() { currentLang = currentLang === 'en' ? 'ko' : 'en'; localStorage.setItem('lang', currentLang); applyLang(); }
    function applyLang() {
      const t = translations[currentLang];
      document.getElementById('langLabel').textContent = currentLang === 'en' ? 'EN' : 'KO';
      document.querySelectorAll('[data-i18n]').forEach(el => { const key = el.getAttribute('data-i18n'); if (t[key]) el.textContent = t[key]; });
    }
    applyLang();
  </script>
